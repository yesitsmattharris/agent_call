services:
  - type: web
    name: agent-call
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NODE_ENV
        value: production
